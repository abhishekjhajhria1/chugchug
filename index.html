<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0b111f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ChugChug" />

  <!-- Favicon & Icons -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Security -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: wss: data: blob:; connect-src 'self' https: wss: http://127.0.0.1:8000 http://localhost:8000 http://127.0.0.1:8001 http://localhost:8001;">

  <!-- SEO -->
  <title>ChugChug — Your Drinking Buddy 🍻</title>
  <meta name="description" content="Track drinks, compete with friends, discover recipes, and party responsibly. ChugChug makes every night legendary." />
  <meta name="keywords" content="drinking app, party tracker, drink counter, friend groups, expense splitting, bar recipes" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ChugChug — Your Drinking Buddy 🍻" />
  <meta property="og:description" content="Track drinks, compete with friends, discover recipes, and party responsibly. ChugChug makes every night legendary." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:site_name" content="ChugChug" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ChugChug — Your Drinking Buddy 🍻" />
  <meta name="twitter:description" content="Track drinks, compete with friends, discover recipes, and party responsibly." />
  <meta name="twitter:image" content="/og-image.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
